# nginx — DÉVELOPPEMENT (HTTP, pas de TLS).
# Sert les statiques Django collectés + proxie tout le reste vers le backend
# Gunicorn/runserver écoutant sur backend:8000.

upstream backend {
    server backend:8000;
}

server {
    listen 80 default_server;
    server_name _;

    # Uploads (avatars, photos de profil). Aligné sur DRF/Django settings.
    client_max_body_size 50M;

    # Logs vers stdout/stderr (récupérés par `docker compose logs nginx`).
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # ── Statiques Django (admin, Swagger UI) ────────────────────────────
    location /static/ {
        alias /staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Médias locaux (utilisés seulement si USE_S3=False) ──────────────
    location /media/ {
        alias /mediafiles/;
        access_log off;
    }

    # ── Tout le reste → backend Django ──────────────────────────────────
    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   X-Forwarded-Host   $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
