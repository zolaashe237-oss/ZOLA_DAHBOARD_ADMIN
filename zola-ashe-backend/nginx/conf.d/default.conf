# nginx — DÉVELOPPEMENT (HTTP, pas de TLS).
# Sert les statiques Django collectés + proxie tout le reste vers le backend
# Gunicorn/runserver écoutant sur backend:8000.

upstream backend {
    server backend:8000;
}

server {
    listen 80 default_server;
    server_name _;

    # Aligné sur la limite max applicative (vidéo 500 Mo, cf. apps/admin_api/views_content.py).
    client_max_body_size 512M;

    # Logs vers stdout/stderr (récupérés par `docker compose logs nginx`).
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # ── Statiques Django (admin, Swagger UI) ────────────────────────────
    location /static/ {
        alias /staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Médias locaux (utilisés seulement si USE_S3=False) ──────────────
    location /media/ {
        alias /mediafiles/;
        access_log off;
        # CORS pour que pdfjs / audio puissent charger les fichiers depuis
        # le frontend Next.js (localhost:3000) sans être bloqués par le navigateur.
        add_header 'Access-Control-Allow-Origin'  '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Max-Age' 3600;
            return 204;
        }
    }

    # ── Tout le reste → backend Django ──────────────────────────────────
    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host               $http_host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   X-Forwarded-Host   $http_host;
        proxy_connect_timeout 5s;
        # Allongé pour absorber les uploads admin (vidéo ~500 Mo + écriture R2).
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_request_buffering off;   # streaming direct vers gunicorn (pas de buffer disque nginx)
    }
}
