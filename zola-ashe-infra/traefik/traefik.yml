# Configuration STATIQUE Traefik (référence — la prod utilise les flags du compose).
# Conservée ici pour documentation et pour un éventuel montage par fichier.
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  le:
    acme:
      email: "${ACME_EMAIL}"
      storage: /letsencrypt/acme.json
      tlsChallenge: {}

log:
  level: INFO
