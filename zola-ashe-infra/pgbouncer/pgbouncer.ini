# Référence PgBouncer (l'image edoburu/pgbouncer se configure via variables
# d'environnement dans le compose ; ce fichier documente le mode visé).
[databases]
* = host=db port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Mode transaction : une connexion serveur n'est tenue que le temps d'une transaction.
# Idéal pour Django/Gunicorn multi-workers — beaucoup de clients, peu de connexions DB.
pool_mode = transaction
max_client_conn = 500
default_pool_size = 20
