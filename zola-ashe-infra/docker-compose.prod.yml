# ZOLA ASHÉ — Stack de PRODUCTION (polyrepo)
# Traefik (TLS auto + load-balancing) route 3 domaines : API, vitrine/espace, admin.
# PgBouncer assure le pooling. Compatible Docker Swarm (deploy.replicas = scaling horizontal).
#
# `image:` + `build:` : en CI on build et pousse les images sur le registry (GHCR) ;
# sur le serveur on tire simplement les images taguées. Le build local reste possible.
# Lancer : docker compose -f docker-compose.prod.yml up -d
services:
  traefik:
    image: traefik:v3.1
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro

  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  backend:
    image: ${REGISTRY:-ghcr.io/zola-ashe}/zola-ashe-backend:${TAG:-latest}
    build: ../zola-ashe-backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3}
    environment:
      DJANGO_ENV: prod
      DJANGO_SETTINGS_MODULE: config.settings.prod
    env_file: ./env/.env
    deploy:
      replicas: 2          # ← scaling horizontal (augmenter selon la charge)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    depends_on:
      - pgbouncer
      - redis

  celery_worker:
    image: ${REGISTRY:-ghcr.io/zola-ashe}/zola-ashe-backend:${TAG:-latest}
    build: ../zola-ashe-backend
    command: celery -A config worker -l info --concurrency=4
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    env_file: ./env/.env
    deploy:
      replicas: 2          # ← workers scalables indépendamment
    depends_on:
      - redis

  celery_beat:
    image: ${REGISTRY:-ghcr.io/zola-ashe}/zola-ashe-backend:${TAG:-latest}
    build: ../zola-ashe-backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    env_file: ./env/.env
    depends_on:
      - redis

  web:
    image: ${REGISTRY:-ghcr.io/zola-ashe}/zola-ashe-web:${TAG:-latest}
    build: ../zola-ashe-web
    command: npm run start
    env_file: ./env/.env.web
    deploy:
      replicas: 2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=le"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    depends_on:
      - backend

  admin:
    image: ${REGISTRY:-ghcr.io/zola-ashe}/zola-ashe-admin:${TAG:-latest}
    build: ../zola-ashe-admin
    command: npm run start
    env_file: ./env/.env.admin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls.certresolver=le"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  letsencrypt:
